# Coding Plan Guide — 唯一数据源
# 字段规范（scripts/validate.mjs 强制校验）:
#   id            : 唯一标识, 用于 URL 锚点 (小写连字符)
#   platform      : 平台名（中文显示名）
#   plan          : 套餐名
#   price_monthly : 月费数字（使用最常用价格，若首月优惠注明在 note）
#   currency      : cny | usd
#   region        : cn | global（国内能否买到/使用为准）
#   type          : coding | token
#   model_flagship: 旗舰模型名
#   models        : 支持模型列表
#   multimodal    : true | false
#   refill_5h     : 5h 请求数（可空）
#   refill_week   : 周请求数（可空）
#   refill_month  : 月请求数（可空）
#   measured_monthly_tokens_M : 实测月可用 Token（百万，可空）
#   yuan_per_M_token : 每百万 Token 等价人民币（usd 按汇率 ~7.2 折算）
#   capability_tier  : T0 | T1 | T2（据 AA Agentic Index 粗档）
#   capability_rank   : 1 | 2 | 3（国内模型排名，1=最强）
#   capability_score : 0–10（据 AA Agentic Index 归一化）
#   quota_score      : 0–10（已过滤集合内归一化，用量越多越高）
#   purchase_difficulty : easy | normal | hard
#   official_url  : 官方购买页（非联盟链接）
#   affiliate_url : 推荐购买页（你的返利链接，可选）
#   note          : 一句话点评（≤50 字）
#   verdict       : 推荐 | 平替 | 谨慎
#   featured      : true | false
#   updated       : YYYY-MM-DD

